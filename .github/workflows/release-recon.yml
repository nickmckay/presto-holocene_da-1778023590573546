name: Release Reconstruction

# Bundles every successful reconstruction into a GitHub Release so the
# scientific record survives long after Actions artifacts expire. The
# release captures the proxy database that was assimilated
# (`lipd_legacy.pkl`), the reconstruction NetCDFs, the validation page,
# and the input configs that produced the run.
#
# Triggers on a successful "Visualize Holocene DA Results" run so that
# both the recon outputs and the validation data are ready at the same
# time. Skips if a release already exists for the source holocene_da run
# ID — so re-running visualize never creates a duplicate release.

on:
  workflow_run:
    workflows: ["Visualize Holocene DA Results"]
    types: [completed]
  workflow_dispatch:
    inputs:
      recon_run_id:
        description: 'holocene_da run ID to release (default: latest successful)'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Bundle reconstruction into a GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve holocene_da run ID
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.recon_run_id }}" ]; then
            RECON_RUN_ID="${{ inputs.recon_run_id }}"
          else
            # The holocene-da-reconstruction-<id> artifact is uploaded by
            # holocene_da.yml. Take the most recent unexpired one as the
            # source of truth.
            RECON_RUN_ID=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq '[.artifacts[] | select(.name | startswith("holocene-da-reconstruction-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id')
          fi
          if [ -z "$RECON_RUN_ID" ] || [ "$RECON_RUN_ID" = "null" ]; then
            echo "ERROR: could not resolve a holocene_da run ID"
            exit 1
          fi
          RECON_RUN_NUMBER=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${RECON_RUN_ID}" \
            --jq '.run_number')
          TAG="recon-${RECON_RUN_ID}"
          echo "recon_run_id=${RECON_RUN_ID}" >> $GITHUB_OUTPUT
          echo "recon_run_number=${RECON_RUN_NUMBER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Check release state
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Resumability: if a previous run created the release but failed
          # before attaching the NetCDF (e.g. the 2 GiB asset cap), we want
          # to re-attempt the upload rather than skip. Only skip when the
          # release already has at least one NetCDF asset attached.
          TAG="${{ steps.resolve.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            NC_COUNT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
              --jq '[.assets[] | select(.name | test("\\.nc(\\.xz)?$"))] | length')
            if [ "$NC_COUNT" -gt 0 ]; then
              echo "Release $TAG already has $NC_COUNT NetCDF asset(s) — skipping."
              echo "skip=true"   >> $GITHUB_OUTPUT
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "Release $TAG exists but has no NetCDF asset — will attach missing assets."
              echo "skip=false"  >> $GITHUB_OUTPUT
              echo "exists=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false"   >> $GITHUB_OUTPUT
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download reconstruction artifact
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./bundle/results
          gh run download "${{ steps.resolve.outputs.recon_run_id }}" \
            --repo "${{ github.repository }}" \
            --name "holocene-da-reconstruction-${{ steps.resolve.outputs.recon_run_id }}" \
            --dir ./bundle/results
          echo "Recon contents:"
          ls -lh ./bundle/results/

      - name: Compress oversized NetCDFs
        if: steps.existing.outputs.skip != 'true'
        run: |
          # GitHub release assets are capped at 2 GiB per file. Any larger
          # NetCDF gets xz-compressed in place (climate data typically
          # shrinks 2-5x). Consumers run `xz -d file.nc.xz` to decompress.
          MAX_BYTES=2147483648
          if [ -d ./bundle/results ]; then
            while IFS= read -r f; do
              SIZE=$(stat -c%s "$f")
              if [ "$SIZE" -ge "$MAX_BYTES" ]; then
                echo "Compressing $(basename "$f") (${SIZE} bytes) with xz..."
                xz -T0 -6 "$f"
                ls -lh "${f}.xz"
              fi
            done < <(find ./bundle/results -type f -name '*.nc')
          fi

      - name: Download proxy database artifact
        if: steps.existing.outputs.skip != 'true'
        # Fail-soft: holocene-da-proxy-data has a 7-day retention. Older
        # runs will be missing it; we still want the release to capture
        # the NetCDFs and validation bundle in that case.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./bundle/proxy
          if gh run download "${{ steps.resolve.outputs.recon_run_id }}" \
               --repo "${{ github.repository }}" \
               --name "holocene-da-proxy-data-${{ steps.resolve.outputs.recon_run_id }}" \
               --dir ./bundle/proxy 2>/dev/null; then
            echo "Proxy data recovered:"
            ls -lh ./bundle/proxy/
          else
            echo "holocene-da-proxy-data artifact unavailable (likely expired) — release will note its absence."
          fi

      - name: Recover validation artifact
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./bundle/validation
          # The validate job uploads validation-output-<run_number> where
          # run_number is the visualize.yml run number, not holocene_da's.
          # Use the most recent unexpired one — for an auto-trigger run
          # it's the visualize run that just finished.
          LATEST=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name | startswith("validation-output-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0] | "\(.workflow_run.id) \(.name)"')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "No validation-output artifact found — releasing without validation bundle."
            exit 0
          fi
          ART_RUN=$(echo "$LATEST" | awk '{print $1}')
          ART_NAME=$(echo "$LATEST" | cut -d' ' -f2-)
          echo "Bundling validation from $ART_NAME (run $ART_RUN)"
          gh run download "$ART_RUN" \
            --repo "${{ github.repository }}" \
            --name "$ART_NAME" \
            --dir ./bundle/validation

      - name: Stage input configs and README snapshot
        if: steps.existing.outputs.skip != 'true'
        run: |
          mkdir -p ./bundle/inputs
          for f in query_params.json config/user_config.yml cleaning_report.json README.md; do
            if [ -f "$f" ]; then
              # Flatten config/user_config.yml → user_config.yml in the bundle
              cp "$f" "./bundle/inputs/$(basename "$f")"
            fi
          done
          ls -lh ./bundle/inputs/

      - name: Tar the validation directory
        if: steps.existing.outputs.skip != 'true'
        run: |
          if [ -d ./bundle/validation ] && [ "$(ls -A ./bundle/validation)" ]; then
            tar -czf ./bundle/validation.tar.gz -C ./bundle validation
            ls -lh ./bundle/validation.tar.gz
          fi

      - name: Build release notes
        if: steps.existing.outputs.skip != 'true'
        id: notes
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="${{ github.event.repository.name }}"
          PAGES_URL="https://${OWNER_LC}.github.io/${REPO_NAME}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.resolve.outputs.recon_run_id }}"
          if [ -f ./bundle/proxy/lipd_legacy.pkl ]; then
            PROXY_LINE="- \`lipd_legacy.pkl\` — the proxy database that was assimilated"
          else
            PROXY_LINE="- *\`lipd_legacy.pkl\` was not recoverable — the upstream artifact had already expired when this release was built (the proxy-data artifact has 7-day retention).*"
          fi
          # List the actual NetCDFs that were captured so the notes match
          # the assets, regardless of how holocene_da named them. Files
          # exceeding the 2 GiB release-asset cap are xz-compressed; flag
          # those so consumers know to decompress before reading.
          NC_LIST=""
          if [ -d ./bundle/results ]; then
            shopt -s nullglob
            for nc in ./bundle/results/*.nc ./bundle/results/*.nc.xz; do
              name=$(basename "$nc")
              case "$name" in
                *.nc.xz)
                  NC_LIST="${NC_LIST}- \`${name}\` — Holocene DA reconstruction NetCDF (xz-compressed; run \`xz -d\` before opening)"$'\n'
                  ;;
                *)
                  NC_LIST="${NC_LIST}- \`${name}\` — Holocene DA reconstruction NetCDF"$'\n'
                  ;;
              esac
            done
          fi
          {
            echo "Reconstruction snapshot from holocene_da run [#${{ steps.resolve.outputs.recon_run_number }}](${RUN_URL})."
            echo ""
            echo "**Bundled assets**"
            echo ""
            if [ -n "$NC_LIST" ]; then
              printf '%s' "$NC_LIST"
            else
              echo "- *no reconstruction NetCDF found in the artifact*"
            fi
            echo "${PROXY_LINE}"
            echo "- \`validation.tar.gz\` — full validation page (HTML + plots) and metrics"
            echo "- \`query_params.json\`, \`user_config.yml\`, \`cleaning_report.json\`, \`README.md\` — inputs and run-context snapshot"
            echo ""
            echo "**Live validation page:** [${PAGES_URL}/validation/index.html](${PAGES_URL}/validation/index.html)"
            echo ""
            echo "Release auto-created by [release-recon.yml](.github/workflows/release-recon.yml). The proxy database (\`lipd_legacy.pkl\`) is captured here because the upstream Actions artifact has only 7-day retention; this release preserves it indefinitely."
          } > release_notes.md
          echo "notes_path=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create or update release
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Flatten asset paths so the release attaches files at top level.
          ASSETS=()
          # All NetCDFs and any auxiliary files (PNGs, configs.yml) from
          # the reconstruction artifact.
          if [ -d ./bundle/results ]; then
            while IFS= read -r f; do
              ASSETS+=("$f")
            done < <(find ./bundle/results -type f)
          fi
          for path in \
              ./bundle/proxy/lipd_legacy.pkl \
              ./bundle/validation.tar.gz \
              ./bundle/inputs/query_params.json \
              ./bundle/inputs/user_config.yml \
              ./bundle/inputs/cleaning_report.json \
              ./bundle/inputs/README.md \
          ; do
            if [ -f "$path" ]; then
              ASSETS+=("$path")
            fi
          done
          echo "Attaching ${#ASSETS[@]} files:"
          printf '  %s\n' "${ASSETS[@]}"

          if [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
            # Resuming a release that exists but lacked the NetCDF asset:
            # upload the missing files and refresh the notes.
            gh release upload "${{ steps.resolve.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              "${ASSETS[@]}"
            gh release edit "${{ steps.resolve.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --notes-file release_notes.md
          else
            gh release create "${{ steps.resolve.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --title "Reconstruction #${{ steps.resolve.outputs.recon_run_number }} (run ${{ steps.resolve.outputs.recon_run_id }})" \
              --notes-file release_notes.md \
              "${ASSETS[@]}"
          fi
