name: Holocene DA Reconstruction

on:
  push:
    paths:
      - 'query_params.json'         # server commits this LAST so all files are present
      - 'config/user_config.yml'    # re-run reconstruction when config changes
  workflow_dispatch:
    inputs:
      unique_id:
        description: 'Unique reconstruction ID'
        required: true
        type: string
      lipd_query_json:
        description: 'LiPD data query parameters (dispatch pathway)'
        required: false
        type: string

jobs:
  # ── Job 1: Acquire and convert proxy data ─────────────────────────────────
  # Uploads lipd_legacy.pkl as an artifact so Job 2 can be re-run independently.
  prepare-data:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Detect which pathway to use.
      # Priority order:
      #   1. query_params.json in repo  — server-committed (push trigger pathway)
      #   2. lipd_query_json input      — manual workflow_dispatch
      - name: Detect data acquisition pathway
        id: pathway
        run: |
          if [ -f "query_params.json" ]; then
            echo "pathway=github_actions" >> $GITHUB_OUTPUT
            MODE=$(jq -r '.mode' query_params.json)
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "Using query_params.json from repo (mode: $MODE)"
          elif [ -n "${{ inputs.lipd_query_json }}" ]; then
            echo "pathway=github_actions" >> $GITHUB_OUTPUT
            echo '${{ inputs.lipd_query_json }}' > query_params.json
            MODE=$(jq -r '.mode' query_params.json)
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "Using lipd_query_json input (mode: $MODE)"
          else
            echo "ERROR: No data source found (no query_params.json, no lipd_query_json)"
            exit 1
          fi

      # ARCHIVED PATHWAY: Download pickle directly from lipdverse
      - name: Download archived compilation
        if: steps.pathway.outputs.mode == 'archived'
        run: |
          COMPILATION=$(jq -r '.compilation' query_params.json)
          VERSION=$(jq -r '.version' query_params.json)
          PICKLE_URL="https://lipdverse.org/${COMPILATION}/${VERSION}/${COMPILATION}${VERSION}.pkl"

          echo "Downloading archived compilation from: $PICKLE_URL"
          curl -L -f "$PICKLE_URL" -o lipd_legacy.pkl || {
            echo "ERROR: Failed to download archived compilation"
            echo "URL: $PICKLE_URL"
            exit 1
          }

          ls -lh lipd_legacy.pkl

      # FILTERED PATHWAY: Run lipdGenerator to produce .lpd files + legacy pickle
      - name: Generate LiPD data from query
        if: steps.pathway.outputs.mode == 'filtered'
        run: |
          echo "Querying lipdverse and generating LiPD data using lipdGenerator container..."
          mkdir -p lipd_output
          docker run --rm \
            -v $(pwd)/query_params.json:/query_params.json:ro \
            -v $(pwd)/lipd_output:/output \
            davidedge/lipd_webapps:lipdGenerator /query_params.json /output pickle

          if [ ! -f lipd_output/lipd_legacy.pkl ]; then
            echo "ERROR: lipdGenerator did not produce lipd_legacy.pkl"
            ls -la lipd_output/ || true
            exit 1
          fi

          mv lipd_output/lipd_legacy.pkl lipd_legacy.pkl
          echo "lipd_legacy.pkl ready:"
          ls -lh lipd_legacy.pkl

      - name: Verify proxy data
        run: |
          if [ -f lipd_legacy.pkl ]; then
            echo "Proxy data ready"
            ls -lh lipd_legacy.pkl
          else
            echo "ERROR: lipd_legacy.pkl not found"
            exit 1
          fi

      - name: Upload proxy data artifact
        uses: actions/upload-artifact@v4
        with:
          name: holocene-da-proxy-data-${{ github.run_id }}
          path: lipd_legacy.pkl
          retention-days: 7

  # ── Job 2: Run Holocene DA reconstruction ──────────────────────────────────
  # Re-run this job alone (via "Re-run failed jobs") when only config
  # changes are needed — no need to redo data generation.
  reconstruct:
    needs: prepare-data
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download proxy data artifact
        uses: actions/download-artifact@v4
        with:
          name: holocene-da-proxy-data-${{ github.run_id }}

      - name: Pull Docker image
        run: docker pull davidedge/lipd_webapps:holocene_da

      - name: Create results directory
        run: mkdir -p ./results

      - name: Download pre-processed model data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read time_resolution from user config
          TIME_RES=$(python3 -c "import yaml; c=yaml.safe_load(open('config/user_config.yml')); print(c['time_resolution'])")
          echo "User time_resolution: $TIME_RES"

          RELEASE_REPO="DaveEdge1/presto-holocene_da"
          RELEASE_TAG="model-data-v1"

          # Check if this resolution is pre-processed
          AVAILABLE="10 20 50 100 200 500 1000"
          if echo "$AVAILABLE" | grep -qw "$TIME_RES"; then
            BEST_RES=$TIME_RES
          else
            BEST_RES="none"
          fi

          mkdir -p models/processed_model_data

          if [ "$BEST_RES" != "none" ]; then
            for MODEL in hadcm3_regrid trace_regrid; do
              FILE="${MODEL}.21999-0BP.tas.timeres_${BEST_RES}.nc"
              echo "Downloading $FILE from release $RELEASE_TAG..."
              gh release download "$RELEASE_TAG" \
                --repo "$RELEASE_REPO" \
                --pattern "$FILE" \
                --dir models/processed_model_data/
            done
            echo "Model data downloaded:"
            ls -lh models/processed_model_data/
          else
            echo "Resolution $TIME_RES is not pre-processed. Downloading original data from Zenodo..."
            curl -L -o holocene_da_data.zip "https://zenodo.org/records/7407116/files/holocene_da_data.zip?download=1"
            unzip -q holocene_da_data.zip "models/original_model_data/*" -d .
            rm holocene_da_data.zip
            echo "Original model data extracted:"
            ls -lhR models/
          fi

      - name: Run Holocene DA reconstruction
        run: |
          echo "Running Holocene DA reconstruction..."
          echo "Config file:"
          cat config/user_config.yml
          echo ""
          # If the repo ships a patched da_main_code.py at the root, mount
          # it over the container's copy. Lets us deploy memory/perf fixes
          # without rebuilding davidedge/lipd_webapps:holocene_da.
          DA_PATCH_MOUNT=""
          if [ -f da_main_code.py ]; then
            echo "Mounting patched da_main_code.py from repo root"
            DA_PATCH_MOUNT="-v $(pwd)/da_main_code.py:/app/da_main_code.py:ro"
          fi
          docker run --rm \
            -v $(pwd)/lipd_legacy.pkl:/proxies/temp12k/Temp12k1_0_2.pkl:ro \
            -v $(pwd)/config/user_config.yml:/config_default.yml:ro \
            -v $(pwd)/models:/models \
            -v $(pwd)/results:/results \
            ${DA_PATCH_MOUNT} \
            davidedge/lipd_webapps:holocene_da

      - name: Verify reconstruction results
        run: |
          if [ -d ./results ] && [ "$(ls -A ./results)" ]; then
            echo "Reconstruction completed successfully"
            ls -lh ./results/
          else
            echo "ERROR: No reconstruction results generated"
            exit 1
          fi

      - name: Include config for visualization
        run: |
          python3 -c "
          import yaml
          with open('config/user_config.yml') as f:
              flat = yaml.safe_load(f)
          nested = {'presto_config': {k: {'value': str(v)} for k, v in flat.items()}}
          with open('results/configs.yml', 'w') as f:
              yaml.dump(nested, f, default_flow_style=False)
          "
          echo "Generated configs.yml for visualization:"
          cat results/configs.yml

      - name: Upload reconstruction results
        uses: actions/upload-artifact@v4
        with:
          name: holocene-da-reconstruction-${{ github.run_id }}
          path: ./results/
          retention-days: 90

      - name: Upload large NetCDF files to GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # NetCDF outputs typically exceed git's 100MB per-file push limit,
          # so publish them as Release assets (2GB per-file cap) instead.
          LARGE_NC=$(find results/ -type f -name "*.nc" -size +100M)
          if [ -z "$LARGE_NC" ]; then
            echo "No NetCDF files >100MB to upload as release assets"
            exit 0
          fi

          TAG="results-${{ github.run_id }}"
          TITLE="Reconstruction results ${{ github.run_id }}"
          NOTES="NetCDF output from Holocene DA reconstruction run [${{ github.run_id }}](../../actions/runs/${{ github.run_id }}). Small artifacts (configs.yml, PNGs) are committed to \`results/\` on \`main\`."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA" \
            $LARGE_NC

          echo "Uploaded to release $TAG:"
          echo "$LARGE_NC"

      - name: Commit results to repository
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Only commit files under 100MB (GitHub's limit).
          # Files >100MB (typically NetCDFs) are uploaded to a GitHub Release instead.
          find results/ -type f -size -100M | while read f; do git add "$f"; done

          if git diff --staged --quiet; then
            echo "No files under 100MB to commit (large files are in the release)"
          else
            git commit -m "Add Holocene DA reconstruction results for ${{ github.run_id }}"
            git push
          fi
